# GitLab-managed security templates (Free tier): SAST (semgrep) + Secret Detection.
# Their jobs carry MR-pipeline-aware rules, so they attach to both MR and main
# pipelines under the workflow: rules below, and land in the `test` stage.
include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml

stages: [lint, test, release]

workflow:
  # Auto-cancel superseded pipelines when a newer commit lands on the same ref
  # (pairs with `default: interruptible: true` below).
  auto_cancel:
    on_new_commit: interruptible
  rules:
    # NOTE: pushes to a feature branch *without* an open MR intentionally build
    # nothing (cost control) — lint/test start once an MR exists. Deliberate; do
    # not "fix" by adding a branch rule.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    # Unanchored (no trailing $) is deliberate, unlike the backend's anchored
    # regex: rc tags (e.g. v0.1.0-rc1) may also release here. See LW-84.
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/

default:
  interruptible: true
  # Shared SaaS runners intermittently fail to create the dind service
  # container ("bad parameter: link is not supported") before any job script
  # runs; retry infra-level failures automatically. Script failures still
  # fail immediately.
  retry:
    max: 2
    when: [runner_system_failure, stuck_or_timeout_failure]

variables:
  GO_IMAGE: "golang:1.25"
  GOMODCACHE: $CI_PROJECT_DIR/.go-mod-cache
  GOCACHE: $CI_PROJECT_DIR/.go-build-cache
  # Run the GitLab AST templates (SAST, Secret Detection) in MR pipelines, not only
  # branch pipelines — their MR-pipeline rules are gated behind this flag.
  AST_ENABLE_MR_PIPELINES: "true"

.go-cache: &go-cache
  key:
    files: [go.sum, client/go.sum]
  paths: [.go-mod-cache, .go-build-cache]

lint:
  stage: lint
  image: golangci/golangci-lint:v2.4.0
  variables:
    GOLANGCI_LINT_CACHE: $CI_PROJECT_DIR/.golangci-cache
  cache:
    # Distinct prefix: same key files as .go-cache but different paths — without
    # it, this job and the Go jobs would overwrite each other's archives under
    # the identical files-hash key (last writer wins, .golangci-cache lost).
    - key:
        prefix: lint
        files: [go.sum, client/go.sum]
      paths: [.go-mod-cache, .go-build-cache, .golangci-cache]
  script:
    - golangci-lint run ./...
    - cd client && golangci-lint run ./...

commitlint:
  stage: lint
  image: node:22-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - npx --yes -p @commitlint/cli@19 -p @commitlint/config-conventional@19
      commitlint --extends @commitlint/config-conventional
      --from "$CI_MERGE_REQUEST_DIFF_BASE_SHA" --to HEAD

.containers: &containers
  image: $GO_IMAGE
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    TESTCONTAINERS_HOST_OVERRIDE: docker
    # These dind jobs run in ephemeral, single-use runner containers, so leaked
    # resources die with the runner anyway — Ryuk only adds startup overhead
    # here. Keep Ryuk enabled locally (long-lived dev/docker hosts).
    TESTCONTAINERS_RYUK_DISABLED: "true"
  cache:
    - *go-cache
  before_script:
    # registry auth for the private backend image (job-token allowlist on the backend project)
    - mkdir -p ~/.docker
    - >
      echo "{\"auths\":{\"registry.gitlab.com\":{\"auth\":\"$(echo -n gitlab-ci-token:$CI_JOB_TOKEN | base64 -w0)\"}}}"
      > ~/.docker/config.json

test:client:
  stage: test
  <<: *containers
  needs: []
  script:
    # -p 1: toxiproxy fault-injection tests race under cross-package parallelism (two docker stacks)
    - cd client && go test ./... -v -timeout 30m -p 1

test:acceptance:
  stage: test
  <<: *containers
  needs: []
  script:
    - apt-get update -qq && apt-get install -y -qq unzip
    - curl -fsSL https://github.com/opentofu/opentofu/releases/download/v1.10.0/tofu_1.10.0_linux_amd64.zip -o /tmp/tofu.zip
    - unzip -o /tmp/tofu.zip -d /usr/local/bin tofu
    - TF_ACC=1 TF_ACC_PROVIDER_HOST=registry.opentofu.org
      TF_ACC_TERRAFORM_PATH=/usr/local/bin/tofu
      go test ./internal/acctest/... -v -timeout 45m

# Root-module unit tests (internal/provider, internal/metadatares,
# internal/lookup). Plain golang image — no dind, no services: the acctest
# package gates container boot on TF_ACC, so this is hermetic and fast, and
# an acceptance flake can never mask a unit regression (LW-106).
test:unit:
  stage: test
  image: $GO_IMAGE
  needs: []
  cache:
    - *go-cache
  script:
    - go test ./... -v -timeout 5m

govulncheck:
  stage: test
  image: $GO_IMAGE
  needs: []
  cache:
    - *go-cache
  script:
    # Pinned, not @latest (LW-107): tool bumps are deliberate. Check
    # `go list -m -versions golang.org/x/vuln` when bumping.
    - go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
    - govulncheck ./...
    - cd client && govulncheck ./...

release-dry-run:
  stage: release
  image: $GO_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  cache:
    - *go-cache
  script:
    - curl -fsSL https://github.com/goreleaser/goreleaser/releases/download/v2.15.4/goreleaser_Linux_x86_64.tar.gz | tar -xz -C /usr/local/bin goreleaser
    - goreleaser check
    # NOTE: runs WITH go.work until client/v0.1.0 exists (LW-68 proves GOWORK=off)
    - goreleaser release --snapshot --skip=sign,publish --clean

release:
  stage: release
  image: $GO_IMAGE
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  # govulncheck gates the tag (owner decision, LW-107): a newly published CVE
  # blocks the release; the remedy is fix-or-triage, then re-tag. No override
  # variable — do not add one.
  needs: [lint, "test:client", "test:acceptance", govulncheck]
  # Must not be cancelled mid-publish: a superseding pipeline's auto-cancel
  # (interruptible: true default) could otherwise kill an in-flight GitHub
  # mirror push / goreleaser publish and leave the release half-created.
  interruptible: false
  variables:
    GIT_DEPTH: "0"
  script:
    - apt-get update -qq && apt-get install -y -qq gnupg git
    - curl -fsSL https://github.com/goreleaser/goreleaser/releases/download/v2.15.4/goreleaser_Linux_x86_64.tar.gz | tar -xz -C /usr/local/bin goreleaser
    - echo "$GPG_PRIVATE_KEY" | gpg --batch --import
    # the tag must be on GitHub BEFORE goreleaser creates the release
    - git remote add github "https://oauth2:${GITHUB_MIRROR_TOKEN}@github.com/leifwind-io/terraform-provider-leifwind.git" || true
    - git push github "$CI_COMMIT_TAG"
    - GOWORK=off GITHUB_TOKEN="$GITHUB_MIRROR_TOKEN" goreleaser release --clean
